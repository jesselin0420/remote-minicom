<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Web Serial 全功能跨網直連與螢幕驗證控制站</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 20px; color: #333; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .box { flex: 1; min-width: 320px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.12); margin-bottom: 12px; }
        h2, h3 { margin-top: 0; color: #008080; }
        button, select, input[type=text], input[type=number] { padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #008080; color: white; border: none; cursor: pointer; margin: 5px 0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.9; }
        button.host-btn { background: #4a69bd; }
        button.client-btn { background: #1e3799; }
        .input-text { width: 60%; }
        .setting-grid { display: grid; grid-template-columns: 110px 1fr; gap: 10px; align-items: center; margin-bottom: 10px; font-size: 14px; }
        textarea { width: 100%; height: 260px; font-family: Consolas, monospace; background: #222; color: #00ff00; padding: 10px; border-radius: 4px; box-sizing: border-box; }
        .status { font-weight: bold; color: #d9534f; margin: 10px 0; }
        .ok { color: #0a7a0a; }
        .err { color: #b00020; }
        .muted { color: #666; font-size: 12px; margin-top: 4px; }
        
        /* BMP 預覽與樣式 */
        #bmp { display: none; }
        #preview { width: 96px; height: 72px; border: 1px solid #c9c9c9; object-fit: contain; background: #eee; }
        .grid-buttons { display: grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 8px; }
        .color-swatch { display: inline-block; width: 16px; height: 16px; border: 1px solid #999; margin-left: 6px; vertical-align: middle; border-radius: 2px; }
        
        /* 歷史紀錄標籤 */
        .history-zone { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
        .history-tag { background: #e0e0e0; color: #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; font-family: monospace; }
        .history-tag:hover { background: #008080; color: white; }
        .clear-history { background: #d9534f; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: auto; }
    </style>
</head>
<body>

    <h1>Web Serial 全功能跨網直連與螢幕驗證控制站</h1>
    <div class="status" id="net-status">尚未連線</div>

    <div class="container">
        <div class="box">
            <h2>1. 雙方自訂名稱對接</h2>
            <p>請輸入雙方約定的機台代號（全球跨網通用）：</p>
            <div style="margin-bottom: 15px;">
                <input type="text" id="custom-room" class="input-text" placeholder="例如: jesse_bench_01">
            </div>
            <button id="btn-host" class="host-btn" onclick="startAsHost()">我是 Host (接硬體端)</button>
            <button id="btn-client" class="client-btn" onclick="startAsClient()">我是 Client (遠端控制)</button>
        </div>
        
        <div class="box">
            <h2>2. 本地硬體設定 (Host端)</h2>
            <div class="setting-grid">
                <label>波特率 (Baud):</label>
                <div>
                    <select id="serial-baud" onchange="toggleCustomBaud(this.value)">
                        <option value="9600">9600</option>
                        <option value="19200">19200</option>
                        <option value="38400">38400</option>
                        <option value="57600">57600</option>
                        <option value="115200" selected>115200 (預設)</option>
                        <option value="230400">230400</option>
                        <option value="460800">460800</option>
                        <option value="921600">921600</option>
                        <option value="1000000">1000000</option>
                        <option value="1500000">1500000</option>
                        <option value="2000000">2000000</option>
                        <option value="3000000">3000000</option>
                        <option value="4000000">4000000 (高速)</option>
                        <option value="6000000">6000000</option>
                        <option value="custom">手動輸入...</option>
                    </select>
                    <input type="number" id="serial-baud-custom" placeholder="輸入純數字" style="display:none; width:110px; margin-left:5px;">
                </div>

                <label>資料位 (Data):</label>
                <select id="serial-data">
                    <option value="8" selected>8 bits</option>
                    <option value="7">7 bits</option>
                    <option value="6">6 bits</option>
                    <option value="5">5 bits</option>
                </select>

                <label>校驗位 (Parity):</label>
                <select id="serial-parity">
                    <option value="none" selected>None (N)</option>
                    <option value="even">Even (E)</option>
                    <option value="odd">Odd (O)</option>
                </select>

                <label>停止位 (Stop):</label>
                <select id="serial-stop">
                    <option value="1" selected>1 bit</option>
                    <option value="2">2 bits</option>
                </select>
            </div>
            <button id="btnConnectSerial" onclick="initSerial()" style="background: #20bf6b; width: 100%;">選擇並開啟實體 COM Port</button>
            <div class="muted">直接控制網頁的 Web Serial API 參數。</div>
        </div>
    </div>

    <div class="box">
        <h2>3. BMP 圖片轉檔與跨網上傳</h2>
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <input id="bmp" type="file" accept=".bmp,image/bmp" onchange="handleBmpSelect()" />
            <button type="button" onclick="document.getElementById('bmp').click()" style="background: #4b6584;">Browse BMP</button>
            <img id="preview" alt="preview" />
            <span id="previewInfo" class="muted">尚未選擇檔案</span>
            <button id="btnUpload" onclick="startBmpUploadWorkflow()" style="background: #eb4d4b;">Convert & Upload</button>
        </div>
        <div class="muted">強制作業流程：dsi init → dsi start → dsi bl_on 100 → lcd load → XMODEM 傳輸 RAW 格式 (1024x480 BGR24)。</div>
        <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
            <progress id="uploadProgress" max="100" value="0" style="width:260px;"></progress>
            <span id="uploadProgressText" class="muted">0%</span>
        </div>
    </div>

    <div class="box">
        <h2>4. 螢幕快速測試指令</h2>
        <div class="grid-buttons">
            <button onclick="sendQuickCmd('lcd fill 0xFFFFFF')">lcd fill 0xFFFFFF<span class="color-swatch" style="background-color:#FFFFFF;"></span></button>
            <button onclick="sendQuickCmd('lcd fill 0xFF0000')">lcd fill 0xFF0000<span class="color-swatch" style="background-color:#FF0000;"></span></button>
            <button onclick="sendQuickCmd('lcd fill 0x00FF00')">lcd fill 0x00FF00<span class="color-swatch" style="background-color:#00FF00;"></span></button>
            <button onclick="sendQuickCmd('lcd fill 0x0000FF')">lcd fill 0x0000FF<span class="color-swatch" style="background-color:#0000FF;"></span></button>
            <button onclick="sendQuickCmd('lcd fill_calib 0xFFFFFF')">lcd fill_calib 0xFFFFFF<span class="color-swatch" style="background-color:#FFFFFF;"></span></button>
            <button onclick="sendQuickCmd('lcd fill_calib 0xFF0000')">lcd fill_calib 0xFF0000<span class="color-swatch" style="background-color:#FF0000;"></span></button>
            <button onclick="sendQuickCmd('lcd fill_calib 0x00FF00')">lcd fill_calib 0x00FF00<span class="color-swatch" style="background-color:#00FF00;"></span></button>
            <button onclick="sendQuickCmd('lcd fill_calib 0x0000FF')">lcd fill_calib 0x0000FF<span class="color-swatch" style="background-color:#0000FF;"></span></button>
        </div>
        
        <div style="margin-top: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <label style="font-size:14px; font-weight:bold;">面板亮度 (Brightness):</label>
            <input id="brightness" type="range" min="0" max="100" value="100" oninput="handleBrightnessInput(this.value)" />
            <span id="brightnessValue">100%</span>
        </div>
    </div>

    <div class="box">
        <h2>5. 跨網指令資料收發控制台</h2>
        <div style="margin-bottom: 10px;">
            <input type="text" id="cmd-input" style="width: 70%;" placeholder="輸入自訂指令。提示：按 Enter 發送，鍵盤 ↑ ↓ 可切換歷史紀錄">
            <button onclick="sendConsoleCmd()">傳送指令</button>
        </div>
        <div style="display: flex; align-items: center; font-size: 13px; color: #666;">
            <span>常用歷史快取 (點擊直接填入)：</span>
            <span class="clear-history" onclick="clearHistory()">清除快取</span>
        </div>
        <div class="history-zone" id="history-list"></div>
        
        <br>
        <textarea id="log" readonly placeholder="通訊日誌..."></textarea>
    </div>

    <script>
        // XMODEM 協定協議常數
        const SOH = 0x01;
        const STX = 0x02;
        const EOT = 0x04;
        const ACK = 0x06;
        const NAK = 0x15;
        const CRC_MODE = 0x43; // 'C'

        let peer = null, conn = null;
        let port = null, writer = null, reader = null;
        const prefix = "jesse-uart-direct-";

        let cmdHistory = [];
        let historyIndex = -1;
        let rxQueue = [];
        let isXmodemSessionActive = false;

        const enc = new TextEncoder();
        const dec = new TextDecoder();

        window.onload = function() {
            const savedHistory = localStorage.getItem('jesse_uart_history');
            if (savedHistory) {
                cmdHistory = JSON.parse(savedHistory);
                renderHistoryTags();
            }

            document.getElementById('cmd-input').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    sendConsoleCmd();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (cmdHistory.length === 0) return;
                    if (historyIndex === -1) historyIndex = cmdHistory.length;
                    if (historyIndex > 0) {
                        historyIndex--;
                        this.value = cmdHistory[historyIndex];
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (cmdHistory.length === 0) return;
                    if (historyIndex !== -1 && historyIndex < cmdHistory.length - 1) {
                        historyIndex++;
                        this.value = cmdHistory[historyIndex];
                    } else {
                        historyIndex = -1;
                        this.value = "";
                    }
                }
            });
            log("INFO", "網頁全功能初始化完畢。");
        };

        function toggleCustomBaud(val) {
            const customInput = document.getElementById('serial-baud-custom');
            customInput.style.display = (val === 'custom') ? 'inline-block' : 'none';
            if (val === 'custom') customInput.focus();
        }

        // ==========================================
        // 核心網路連線機制 (WebRTC)
        // ==========================================
        function startAsHost() {
            const roomName = document.getElementById('custom-room').value.trim();
            if (!roomName) return alert("請輸入約定名稱！");
            updateStatus(`正在向雲端註冊名稱 [${roomName}]...`, "#f0ad4e");
            lockButtons();
            if(peer) peer.destroy();
            peer = new Peer(prefix + roomName);

            peer.on('open', id => {
                updateStatus(`Host 已就緒！等待 Client 輸入 [${roomName}] 連入...`, "#5cb85c");
                log("INFO",
